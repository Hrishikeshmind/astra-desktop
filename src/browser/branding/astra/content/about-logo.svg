<!-- Astra Browser logo — frosted glass orb with Indian sunset gradient -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Outer sunset gradient (deep indigo → violet → magenta → orange) -->
    <radialGradient id="astra-outer" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#F0A500"/>
      <stop offset="30%"  stop-color="#D4532A"/>
      <stop offset="60%"  stop-color="#8B2252"/>
      <stop offset="85%"  stop-color="#4A1B8C"/>
      <stop offset="100%" stop-color="#1A1035"/>
    </radialGradient>

    <!-- Inner glow gradient -->
    <radialGradient id="astra-inner-glow" cx="38%" cy="32%" r="50%">
      <stop offset="0%"   stop-color="#FFCB47" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#F0A500" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4A1B8C" stop-opacity="0"/>
    </radialGradient>

    <!-- Frosted glass shimmer -->
    <linearGradient id="astra-shimmer" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="astra-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8"
                    flood-color="#1A1035" flood-opacity="0.6"/>
    </filter>

    <!-- Clip to circle -->
    <clipPath id="astra-circle-clip">
      <circle cx="64" cy="64" r="58"/>
    </clipPath>
  </defs>

  <!-- Main orb -->
  <circle cx="64" cy="64" r="58" fill="url(#astra-outer)" filter="url(#astra-shadow)"/>

  <!-- Inner glow layer -->
  <circle cx="64" cy="64" r="58" fill="url(#astra-inner-glow)" clip-path="url(#astra-circle-clip)"/>

  <!-- Frosted glass highlight (top-left arc) -->
  <ellipse cx="46" cy="40" rx="28" ry="18"
           fill="url(#astra-shimmer)"
           transform="rotate(-20, 46, 40)"
           clip-path="url(#astra-circle-clip)"/>

  <!-- Star / Astra symbol — eight-pointed star in the centre -->
  <g transform="translate(64,64)" fill="none">
    <!-- Outer star rays (warm gold) -->
    <path d="M0,-22 L3,-3 L22,0 L3,3 L0,22 L-3,3 L-22,0 L-3,-3 Z"
          fill="#FFCB47" opacity="0.95"/>
    <!-- Inner star rays (rotated 45°, slightly smaller) -->
    <path d="M0,-16 L2,-2 L16,0 L2,2 L0,16 L-2,2 L-16,0 L-2,-2 Z"
          fill="#F0A500" opacity="0.7"
          transform="rotate(45)"/>
    <!-- Centre dot -->
    <circle r="4" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Thin glass rim -->
  <circle cx="64" cy="64" r="57"
          fill="none"
          stroke="rgba(255,255,255,0.18)"
          stroke-width="1.5"/>
</svg>
